<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorite Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 text-stone-800">

    <header class="bg-amber-800 text-white text-center py-16 shadow-lg">
        <h1 class="text-4xl font-serif font-bold">お気に入りカフェ紹介</h1>
        <p class="mt-2 text-amber-200">ウェブアプリケーション2026 最終成果物</p>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-12">
        
        <section class="bg-white p-8 rounded-2xl shadow-sm mb-8">
            <h2 class="text-2xl font-bold text-amber-900 border-b-2 border-amber-500 pb-2 mb-4">☕️ はじめに</h2>
            <p class="leading-relaxed text-stone-600">
                このサイトでは、私が普段よく行くおすすめのカフェや、お気に入りのメニューについて紹介しています。
                落ち着いた雰囲気の空間で、美味しいコーヒーを飲む時間が一番の癒やしです。
            </p>
        </section>

        <section class="bg-white p-8 rounded-2xl shadow-sm">
            <h2 class="text-2xl font-bold text-amber-900 border-b-2 border-amber-500 pb-2 mb-4">🍰 おすすめのメニュー</h2>
            
            <div class="space-y-6">
                <div class="border-l-4 border-amber-700 pl-4">
                    <h3 class="text-xl font-bold text-stone-700">自家製プリン</h3>
                    <p class="mt-1 text-stone-600">少し固めで、ほろ苦いカラメルソースがたっぷりかかった昔ながらのプリンです。</p>
                </div>
                
                <div class="border-l-4 border-amber-700 pl-4">
                    <h3 class="text-xl font-bold text-stone-700">水出しアイスコーヒー</h3>
                    <p class="mt-1 text-stone-600">時間をかけてじっくり抽出された、すっきりとしていてコクのある一杯です。</p>
                </div>
            </div>
        </section>

    </main>

    <footer class="text-center py-8 text-stone-400 text-sm">
        &copy; 2026 学籍番号 2324047
    </footer>

</body>
</html>
